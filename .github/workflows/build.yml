name: Build SpendTracker IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, Testing ]

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show project structure
        run: find . -type f | sort

      # ── Build Archive (no signing) ─────────────────────────────
      - name: Build Archive
        run: |
          xcodebuild archive \
            -project SpendTracker.xcodeproj \
            -scheme SpendTracker \
            -configuration Release \
            -archivePath $RUNNER_TEMP/SpendTracker.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # ── Package .app into unsigned .ipa manually ───────────────
      # (Skips xcodebuild -exportArchive which needs a signing team)
      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/IPA/Payload
          # Find the .app inside the archive
          APP_PATH=$(find $RUNNER_TEMP/SpendTracker.xcarchive -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" $RUNNER_TEMP/IPA/Payload/
          cd $RUNNER_TEMP/IPA
          zip -r $RUNNER_TEMP/SpendTracker.ipa Payload/
          echo "IPA created successfully"
          ls -lh $RUNNER_TEMP/SpendTracker.ipa

      # ── Upload IPA ─────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpendTracker-IPA
          path: ${{ runner.temp }}/SpendTracker.ipa
          retention-days: 7

      - name: Summary
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "Download SpendTracker.ipa from Artifacts and install via AltStore or Sideloadly." >> $GITHUB_STEP_SUMMARY
